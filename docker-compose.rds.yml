# RDS override: run app + sidecar against an external RDS Postgres instead of the local
# `db` container. Layered on top of the base file (NOT together with docker-compose.prod.yml,
# which wires the db container):
#
#   docker compose -f docker-compose.yml -f docker-compose.rds.yml up -d
#
# vs. the local-db setup this override:
#   - drops the `db` service entirely (RDS replaces it) and the app's depends_on: db,
#   - mounts the AWS RDS CA bundle read-only into the app so psycopg can verify-full,
#   - keeps restart policies + the localhost-only app port (same rationale as prod).
#
# Required env on the host (exported by deploy-rds.sh; password comes from Secrets Manager):
#   DB_HOST, DB_PASSWORD (raw), and optionally DB_PORT/DB_USER/DB_NAME/DB_SSLMODE/DB_SSLROOTCERT
#   GEMINI_API_KEY
# config.py assembles the SQLAlchemy URL from these parts (URL.create encodes the password),
# so nothing here hand-builds a URL. The CA bundle must exist at ./certs/global-bundle.pem
# on the host (deploy-rds.sh fetches it) for sslmode=verify-full.

services:
  db: !reset null          # remove the local Postgres container; RDS is the database now

  sidecar:
    restart: unless-stopped

  app:
    restart: unless-stopped
    depends_on: !override
      sidecar:
        condition: service_healthy
    environment:
      # The base docker-compose.yml hardcodes DATABASE_URL (pointing at the local `db`
      # container). config.py prioritizes DATABASE_URL over the DB_* parts, so that
      # inherited value would shadow RDS. `!reset` drops it so only the parts below apply.
      DATABASE_URL: !reset null
      # DB connection as discrete parts; app/config.py builds the SQLAlchemy URL from them.
      DB_HOST: ${DB_HOST:?set DB_HOST (see deploy-rds.sh)}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD (from Secrets Manager, see deploy-rds.sh)}
      DB_NAME: ${DB_NAME:-postgres}
      DB_SSLMODE: ${DB_SSLMODE:-verify-full}
      DB_SSLROOTCERT: ${DB_SSLROOTCERT:-/certs/global-bundle.pem}
      KLEINANZEIGEN_API_BASE_URL: http://sidecar:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY on the host}
    volumes:
      # RDS CA bundle for sslmode=verify-full. Read-only; path matches sslrootcert in DATABASE_URL.
      - ./certs/global-bundle.pem:/certs/global-bundle.pem:ro
    ports: !override
      - "127.0.0.1:8080:8080"
