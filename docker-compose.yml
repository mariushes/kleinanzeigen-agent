# Local production-shaped stack: Postgres + scraping sidecar + app.
# This mirrors the AWS target (RDS ~ db, ECS/EC2 containers ~ app+sidecar) so what
# runs here is what runs there, minus the managed services. See DEPLOY.md.
#
#   docker compose up --build
#   open http://localhost:8080
#
# Requires GEMINI_API_KEY in a .env file next to this compose file (see .env.example).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kleinanzeigen
      POSTGRES_PASSWORD: kleinanzeigen        # local only; on AWS this comes from Secrets Manager / RDS
      POSTGRES_DB: kleinanzeigen
    ports:
      - "5432:5432"                           # exposed only for local psql; not needed by the app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kleinanzeigen"]
      interval: 5s
      timeout: 5s
      retries: 10

  sidecar:
    build:
      context: ./vendor/ebay-kleinanzeigen-api    # ships its own Dockerfile (Playwright + Chromium)
    # No published ports: only the app talks to it, over the compose network.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 5

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
      sidecar:
        condition: service_healthy
    environment:
      # SQLAlchemy Postgres URL — code is already driver-agnostic (settings.database_url).
      DATABASE_URL: postgresql+psycopg://kleinanzeigen:kleinanzeigen@db:5432/kleinanzeigen
      # Reach the sidecar by its compose service name, not 127.0.0.1.
      KLEINANZEIGEN_API_BASE_URL: http://sidecar:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env}
    ports:
      - "8080:8080"

volumes:
  pgdata:
